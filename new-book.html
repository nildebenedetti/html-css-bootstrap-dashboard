<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggiungi Libro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="styles/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.3/font/bootstrap-icons.css">


</head>

<body>
    <!-- dispongo header-->
    <header class="header">
        <h1 class="page-header">
            Nuovo Libro
        </h1>

    </header>
    <!-- dispongo body, in cui andrò a inserire la struttura bootstrap e poi il form con i suoi 
    vari componenti-->
    <main class="main">
        <section class="book-form">

            <div class="wrapper">

                <form>
                    <!-- struttura a row-->
                    <div class="container">
                        <div class="row">
                            <!-- email-->
                            <div class="col-12 mb-3">
                                <label for="exampleInputEmail1" class="form-label">Email address</label>
                                <input required type="email" class="form-control" id="exampleInputEmail1"
                                    aria-describedby="emailHelp">
                                <div id="emailHelp" class="form-text">We'll never share your email with anyone else.
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="check-btn">
                        <label class="form-check-label" for="exampleCheck1">Check me out</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Submit</button>
                </form>
            </div>
        </section>
    </main>

</body>

</html>
