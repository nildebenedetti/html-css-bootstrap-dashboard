<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aggiungi Libro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <link rel="stylesheet" href="styles/style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.3/font/bootstrap-icons.css">


</head>

<body>
    <!-- inserisco navbar-->

    <nav class="navbar navbar-expand-lg bg-dark">
        <div class="container-fluid">
            <img src="img/duck.png" alt="una paperella molto rock'n'roll" class=" duck-logo">
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon text-light">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="#fff" class="bi bi-list"
                        viewBox="0 0 16 16">
                        <path fill-rule="evenodd"
                            d="M2.5 12a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5m0-4a.5.5 0 0 1 .5-.5h10a.5.5 0 0 1 0 1H3a.5.5 0 0 1-.5-.5" />
                    </svg>
                </span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Catalogo Libri</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Anagrafica Utenti</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Storico Prestiti</a>
                    </li>

                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown"
                            aria-expanded="false">
                            Help
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#">Summon Tutor</a></li>
                            <li><a class="dropdown-item" href="#">Aiuto del Pubblico</a></li>
                            <li>
                                <hr class="dropdown-divider">
                            </li>
                            <li><a class="dropdown-item" href="#">Arrenditi ora</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link disabled" aria-disabled="true"></a>
                    </li>
                </ul>
                <form class="d-flex" role="search">
                    <input class="form-control me-2 bg-light text-" type="search" placeholder="Cerca..."
                        aria-label="Search" />
                    <button class="btn text-light btn-outline-light" type="submit">Cerca</button>
                </form>
            </div>
        </div>
    </nav>


    <!-- dispongo main, in cui andrò a inserire la struttura bootstrap e poi il form con i suoi 
    vari componenti-->
    <main class="main">

        <section class="book-form">
            <header class="header">
                <h2 class="page-header fw-light p-3">
                    Nuovo Libro
                </h2>

            </header>

            <div class="wrapper">

                <form>
                    <!-- struttura a row-->
                    <div class="container">
                        <div class="row mx-0">
                            <!-- inserisco 2*input text con col-6 nome autore + cognome autore-->
                            <div class="col-6 mb-3">
                                <label for="author-name" class="form-label mx-1">Nome Autore</label>
                                <input type="text" class="form-control" id="author-name"
                                    placeholder="Inserisci il nome dell'autore" aria-describedby="emailHelp">
                            </div>
                            <div class="col-6 mb-3">
                                <label for="author-surname" class="form-label mx-1">Cognome Autore</label>
                                <input type="text" class="form-control" id="author-surname"
                                    placeholder="Inserisci il cognnome dell'autore" aria-describedby="emailHelp">
                            </div>


                            <!-- inserisco 1*input text con col-12 e testo chiarificatore-->
                            <div class="col-12 mb-3">
                                <label for="author-name" class="form-label mx-1">Titolo</label>
                                <input type="text" class="form-control" id="author-name"
                                    placeholder="Inserisci il titolo del libro" aria-describedby="emailHelp">
                                <div id="title-instructions" class="form-text">Titolo versione italiana</div>
                            </div>

                            <!--Inserisco 3* input text con col-sm-12 e col-lg-4-->
                            <select class="col-sm-12 col-lg-4 form-select pt-2 pb-2 mb-3" aria-label="Default select example">
                                <option selected >Scegli il genere</option>
                                <option value="1">Fantasy</option>
                                <option value="2">Thriller</option>
                                <option value="3">Romantico</option>
                            </select>

                        </div>
                        <!-- il precedente div dovrà avere un border bottom che funge da hr-->
                        <!-- Inserisco text-area con w-100-->

                        <!-- checkbox -->
                        <div class="mb-3 form-check">
                            <input type="checkbox" class="form-check-input" id="check-btn">
                            <label class="form-check-label" for="exampleCheck1">Check me out</label>
                        </div>
                        <!-- button -->
                        <button type="submit" class="btn btn-primary">Submit</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- inserisco script bootstrap-->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
